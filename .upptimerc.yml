# Upptime configuration — https://upptime.js.org/docs/configuration
owner: arniko-inc
repo: arniko-status

sites:
  - name: Arniko Academy
    url: https://arniko.academy/
  - name: Production API
    url: https://api.arniko.academy/ping
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "pong"
  - name: Beta API
    url: https://api-beta.arniko.academy/ping
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "pong"

status-website:
  cname: status.arniko.academy
  name: Arniko Status
  introTitle: "**Arniko Status** — live uptime monitoring for Arniko Academy services."
  introMessage: Real-time status powered by [Upptime](https://upptime.js.org). No server required — just GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Notifications:
# - GitHub Issues notifications are built-in and automatic (no config needed).
# - Telegram can be added later WITHOUT changing this file — set repo secrets:
#     NOTIFICATION_TELEGRAM=true, NOTIFICATION_TELEGRAM_BOT_KEY, NOTIFICATION_TELEGRAM_CHAT_ID
